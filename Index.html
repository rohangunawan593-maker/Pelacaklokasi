<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker HP</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}
input,button{
    padding:10px;
    margin:5px;
    border-radius:5px;
    border:none;
}
button{
    background:#22c55e;
    color:white;
}
#map{
    width:90%;
    height:300px;
    margin-top:20px;
}
</style>
</head>

<body>

<h2>📍 Tracker HP Real-Time</h2>

<div id="login">
<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
<p id="status">Menunggu lokasi...</p>
<iframe id="map"></iframe><br>
<button onclick="sendWA()">Kirim ke WhatsApp</button>
</div>

<script>
let lat = 0;
let lon = 0;

// LOGIN SEDERHANA
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "123"){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        startTracking();
    }else{
        alert("Login salah");
    }
}

// TRACKING REAL-TIME
function startTracking(){
    setInterval(()=>{
        navigator.geolocation.getCurrentPosition(pos=>{
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;

            document.getElementById("status").innerHTML =
                "📍 "+lat+", "+lon;

            document.getElementById("map").src =
                `https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed`;

        });
    },1000);
}

// KIRIM KE WHATSAPP
function sendWA(){
    let link = `https://wa.me/?text=Lokasi saya: https://maps.google.com/?q=${lat},${lon}`;
    window.open(link, "_blank");
}
</script>

</body>
</html>
